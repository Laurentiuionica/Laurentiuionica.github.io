<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Temperatura</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="weather">
        <h1>App Temperatura</h1>
        <div>
            <input id="city-input" placeholder="Ciudad o código postal">
            <button id="search-btn">Buscar</button>
        </div>

        <div id="weather-info">
            <h2 id="city"></h2>
            <img id="weather-icon" class="weather-icon" src="">
            <div id="temp" class="temp"></div>
            <div id="desc"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
