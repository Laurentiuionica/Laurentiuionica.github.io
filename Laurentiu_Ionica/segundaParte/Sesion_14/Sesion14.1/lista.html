<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Personas - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="main.js"></script>
    <script src="mainLista.js"></script>
</head>

<body>
    <div class="container">
        <div class="list-header">
            <div class="header-icon">
                <i class="fas fa-users"></i>
            </div>
            <h1>Lista de Personas</h1>
            <p class="list-subtitle">Gestiona todos los registros de personas</p>
        </div>

        <div class="table-container">
            <table id="personas">
                <thead>
                    <tr>
                        <th><i class="fas fa-user"></i> Nombre</th>
                        <th><i class="fas fa-birthday-cake"></i> Edad</th>
                        <th><i class="fas fa-calendar"></i> Fecha de Nacimiento</th>
                        <th><i class="fas fa-map-marker-alt"></i> Localidad</th>
                        <th><i class="fas fa-home"></i> Dirección</th>
                        <th><i class="fas fa-cogs"></i> Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-personas"></tbody>
            </table>
        </div>

        <div class="list-actions">
            <a href="formulario.html" class="btn-add">
                <i class="fas fa-plus"></i>
                <span>Agregar nueva persona</span>
            </a>
        </div>
    </div>
</body>

</html>
